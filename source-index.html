<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sench//Index, a created-only streetwear magazine for original SenchTV Pinterest pins."
    />
    <title>Sench//Index</title>
    <style>
      html,
      body {
        background: #080808;
        color: #f3efe5;
        margin: 0;
        min-height: 100%;
      }

      .static-fallback {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          #080808;
        background-size: 72px 72px;
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
        padding: 48px 18px;
      }

      .static-fallback__inner {
        margin: 0 auto;
        max-width: 1120px;
      }

      .static-fallback p {
        color: #d8ff3f;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        margin: 0 0 18px;
        text-transform: uppercase;
      }

      .static-fallback h1 {
        font-size: clamp(3.4rem, 13vw, 10rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.78;
        margin: 0 0 24px;
        text-transform: uppercase;
      }

      .static-fallback strong {
        border-left: 4px solid #ff5c33;
        color: rgba(243, 239, 229, 0.78);
        display: block;
        font-size: 1rem;
        max-width: 560px;
        padding-left: 16px;
      }

      .static-fallback__grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 28px;
      }

      .static-fallback__grid img {
        aspect-ratio: 4 / 5;
        border: 1px solid rgba(243, 239, 229, 0.22);
        display: block;
        object-fit: cover;
        width: 100%;
      }

      @media (max-width: 680px) {
        .static-fallback__grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="static-fallback">
        <div class="static-fallback__inner">
          <p>Sench//Index / created-only magazine</p>
          <h1>SenchTV. Created pins. Full issue.</h1>
          <strong>
            This page uses only the three SenchTV created pin images you supplied.
          </strong>
          <div class="static-fallback__grid" aria-label="Created pin image preview">
            <img src="https://i.pinimg.com/736x/81/b7/95/81b7955f8a71bf2388414a8b59919d92.jpg" alt="SenchTV created Pinterest fashion image with blue denim styling" referrerpolicy="no-referrer" />
            <img src="https://i.pinimg.com/736x/ee/fe/ed/eefeed26d894b54ad4d74347579296cd.jpg" alt="SenchTV created Pinterest fashion image with bright styling" referrerpolicy="no-referrer" />
            <img src="https://i.pinimg.com/736x/cb/b6/4e/cbb64ed60dc3a31f80b714d65403e4c9.jpg" alt="SenchTV created Pinterest fashion image with red styling" referrerpolicy="no-referrer" />
          </div>
        </div>
      </section>
    </div>
    <noscript>
      <section class="static-fallback">
        <div class="static-fallback__inner">
          <p>JavaScript required</p>
          <h1>Sench//Index</h1>
          <strong>
            Enable JavaScript to view the full created-only fashion magazine.
          </strong>
        </div>
      </section>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
